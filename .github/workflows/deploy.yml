name: Deploy to Vercel

on:
  push:
    branches: [main]

# Project identifiers (not secrets). Only VERCEL_TOKEN is a GitHub secret.
env:
  VERCEL_ORG_ID: team_mrh9eyx7XcT6qaADTV3zHJMb
  VERCEL_PROJECT_ID: prj_wyS6seBspgUC7b9SBDvtdhkGCvdw

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull production env vars from Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Export the pulled VITE_* vars so Vite bakes them into the build.
      - name: Build with project env vars
        run: |
          set -a
          . ./.vercel/.env.production.local
          set +a
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify env baked into build
        run: |
          if grep -rlq "itamarkln-dev" .vercel/output; then
            echo "✓ links baked into build output"
          else
            echo "✗ links missing from build output"; exit 1
          fi

      # Prebuilt deploys don't auto-alias, so promote to assign production domains.
      - name: Deploy and promote to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | tail -1)
          echo "Deployed: $URL"
          vercel promote "$URL" --token=${{ secrets.VERCEL_TOKEN }}
